name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    strategy:
      matrix:
        node-version: ["18.x", "20.x", "22.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          registry-url: "https://npm.pkg.github.com"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Lint
        run: npm run lint

      - name: Build (TypeScript → dist/)
        run: npm run build

      - name: Verify declaration files are emitted
        run: |
          if [ ! -f dist/kit/index.d.ts ]; then
            echo "ERROR: dist/kit/index.d.ts not found after build"
            exit 1
          fi
          echo "✓ TypeScript declarations present"

      - name: Test
        run: npm test

      - name: Upload build artifact (Node 20 only)
        if: matrix.node-version == '20.x'
        uses: actions/upload-artifact@v4
        with:
          name: mambakit-dist
          path: dist/
          retention-days: 7
